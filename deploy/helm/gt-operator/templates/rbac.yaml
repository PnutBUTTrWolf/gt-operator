apiVersion: v1
kind: ServiceAccount
metadata:
  name: gt-operator
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gt-operator
rules:
  # Manage Pods for agent lifecycle
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Manage PVCs for rig storage
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Manage Deployments for infrastructure agents
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Manage ConfigMaps and Secrets for config
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  # Watch custom resources
  - apiGroups: ["gastown.io"]
    resources: ["polecats", "polecats/status", "rigs", "rigs/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events for operator status reporting
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gt-operator
subjects:
  - kind: ServiceAccount
    name: gt-operator
    namespace: {{ .Values.namespace }}
roleRef:
  kind: ClusterRole
  name: gt-operator
  apiGroup: rbac.authorization.k8s.io
