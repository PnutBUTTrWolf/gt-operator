apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rigs.gastown.io
spec:
  group: gastown.io
  names:
    kind: Rig
    listKind: RigList
    plural: rigs
    singular: rig
    shortNames:
      - rg
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - name
                - gitUrl
              properties:
                name:
                  type: string
                  description: Rig name
                gitUrl:
                  type: string
                  description: Git repository URL
                defaultBranch:
                  type: string
                  default: main
                  description: Default branch for the rig
                storageClass:
                  type: string
                  description: StorageClass for the RWX PVC (e.g. efs-sc, filestore-sc)
                storageSize:
                  type: string
                  default: 50Gi
                  description: Size of the RWX PVC
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Initializing
                    - Ready
                    - Error
                pvcName:
                  type: string
                  description: Name of the created RWX PVC
                witnessReady:
                  type: boolean
                refineryReady:
                  type: boolean
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Git URL
          type: string
          jsonPath: .spec.gitUrl
        - name: Branch
          type: string
          jsonPath: .spec.defaultBranch
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Witness
          type: boolean
          jsonPath: .status.witnessReady
        - name: Refinery
          type: boolean
          jsonPath: .status.refineryReady
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
