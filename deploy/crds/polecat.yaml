apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: polecats.gastown.io
spec:
  group: gastown.io
  names:
    kind: Polecat
    listKind: PolecatList
    plural: polecats
    singular: polecat
    shortNames:
      - pc
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - rig
                - bead
              properties:
                rig:
                  type: string
                  description: Name of the rig this polecat belongs to
                bead:
                  type: string
                  description: Bead ID assigned to this polecat
                branch:
                  type: string
                  description: Git branch name (e.g. polecat/toast)
                formula:
                  type: string
                  description: Formula to use (e.g. shiny, shiny-enterprise)
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Running
                    - Succeeded
                    - Failed
                  description: Current phase of the polecat
                podName:
                  type: string
                  description: Name of the backing Pod
                sessionName:
                  type: string
                  description: tmux session name inside the pod
                startedAt:
                  type: string
                  format: date-time
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Rig
          type: string
          jsonPath: .spec.rig
        - name: Bead
          type: string
          jsonPath: .spec.bead
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Pod
          type: string
          jsonPath: .status.podName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
